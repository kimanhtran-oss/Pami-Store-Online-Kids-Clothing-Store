<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="24630641" content="Luong Ngo Gia An" />
    <title>Đăng nhập - Pami Store</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Times New Roman", Times, serif;
        background-color: #f5efeb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: white;
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #ccc;
        width: 380px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .header {
        text-align: center;
        margin-bottom: 25px;
      }

      .header h1 {
        color: #2f4156;
        font-size: 28px;
        letter-spacing: 2px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #567c8d;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #567c8d;
        border-radius: 10px;
        outline: none;
        font-family: "Times New Roman", Times, serif;
      }

      .error-msg {
        color: #d9534f;
        font-size: 12px;
        display: none;
      }

      .btn-submit,
      .btn-back {
        display: block;
        width: 100%;
        padding: 12px;
        background-color: #567c8d;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
        text-decoration: none;
        line-height: normal;
      }

      .btn-submit:hover,
      .btn-back:hover {
        background-color: #2f4156;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
      }

      .footer a.reg-link {
        color: #567c8d;
        text-decoration: none;
        font-weight: bold;
      }

      .footer a.reg-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>PAMI STORE</h1>
        <p>Đăng nhập</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" />
          <p class="error-msg" id="emailError">Vui lòng nhập email!</p>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" />
          <p class="error-msg" id="passwordError">Vui lòng nhập mật khẩu!</p>
        </div>

        <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
      </form>

      <div class="footer">
        Chưa có tài khoản? <a href="./register.html" class="reg-link">Đăng ký</a>
        <br /><br />
        <a href="../index.html" class="btn-back">QUAY LẠI TRANG CHỦ</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;

        document.getElementById("emailError").style.display = "none";
        document.getElementById("passwordError").style.display = "none";

        let hopLe = true;

        if (email === "") {
          document.getElementById("emailError").style.display = "block";
          hopLe = false;
        }
        if (pass === "") {
          document.getElementById("passwordError").style.display = "block";
          hopLe = false;
        }

        if (hopLe) {
          const danhSachUser =
            JSON.parse(localStorage.getItem("pamiUsers")) || [];
          let user = danhSachUser.find(
            (u) => u.email === email && u.password === pass,
          );
          if (user) {
            alert("Đăng nhập thành công!");
            window.location.href = "../index.html";
          } else {
            alert("Email hoặc mật khẩu không chính xác!");
          }
        }
      });
    </script>
  </body>
</html>
