<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="24630641" content="Luong Ngo Gia An" />
    <title>Đăng ký - PamiStore</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Times New Roman", Times, serif;
        background-color: #f5efeb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: white;
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #ccc;
        width: 380px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .header {
        text-align: center;
        margin-bottom: 25px;
      }

      .header h1 {
        color: #2f4156;
        font-size: 28px;
        letter-spacing: 2px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #567c8d;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #567c8d;
        border-radius: 10px;
        outline: none;
        font-family: "Times New Roman", Times, serif;
      }

      .error-msg {
        color: #d9534f;
        font-size: 12px;
        margin-top: 3px;
        display: none;
      }

      .btn-submit,
      .btn-back {
        display: block;
        width: 100%;
        padding: 12px;
        background-color: #567c8d;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        font-size: 14px;
        text-align: center;
        text-decoration: none;
        line-height: normal;
      }

      .btn-submit:hover,
      .btn-back:hover {
        background-color: #2f4156;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
      }

      .footer a.login-link {
        color: #567c8d;
        text-decoration: none;
        font-weight: bold;
      }

      .footer a.login-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>PAMI STORE</h1>
        <p>Đăng ký</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label>Họ và tên</label>
          <input type="text" id="fullname" />
          <p class="error-msg" id="fullnameError">Vui lòng nhập họ tên!</p>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" />
          <p class="error-msg" id="emailError">Email không hợp lệ!</p>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" />
          <p class="error-msg" id="passwordError">Mật khẩu phải từ 6 ký tự!</p>
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" />
          <p class="error-msg" id="confirmError">Mật khẩu không khớp!</p>
        </div>

        <button type="submit" class="btn-submit">ĐĂNG KÝ</button>
      </form>

      <div class="footer">
        Đã có tài khoản? <a href="./login.html" class="login-link">Đăng nhập</a>
        <br /><br />
        <a href="../index.html" class="btn-back">QUAY LẠI TRANG CHỦ</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("registerForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("fullname").value;
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        document
          .querySelectorAll(".error-msg")
          .forEach((el) => (el.style.display = "none"));

        let hopLe = true;

        if (name === "") {
          document.getElementById("fullnameError").style.display = "block";
          hopLe = false;
        }
        if (email === "" || !email.includes("@")) {
          document.getElementById("emailError").style.display = "block";
          hopLe = false;
        }
        if (pass.length < 6) {
          document.getElementById("passwordError").style.display = "block";
          hopLe = false;
        }
        if (confirm !== pass || confirm === "") {
          document.getElementById("confirmError").style.display = "block";
          hopLe = false;
        }

        if (hopLe) {
          let danhSachUser =
            JSON.parse(localStorage.getItem("pamiUsers")) || [];
          danhSachUser.push({
            email: email,
            password: pass,
            name: name,
          });
          localStorage.setItem("pamiUsers", JSON.stringify(danhSachUser));
          alert("Đăng ký thành công!");
          window.location.href = "./login.html";
        }
      });
    </script>
  </body>
</html>
